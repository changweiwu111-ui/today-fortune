<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日運勢 ・ 刷臉抽籤</title>
<style>
  :root{
    --gold:#d8b66a; --gold-soft:#e8d3a0; --gold-deep:#a9863f;
    --text:#f3ecdb; --muted:#9b93ab; --line:rgba(216,182,106,.18); --good:#7ad6a0; --mystic:#b69be0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{margin:0;
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; color:var(--text);
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a2140 0%, transparent 60%),
      radial-gradient(900px 600px at 90% 110%, #241a3a 0%, transparent 55%),
      linear-gradient(160deg,#0c0a14 0%,#120d1d 50%,#0a0810 100%);
    background-attachment:fixed;
    /* align-items:flex-start 避免內容比螢幕高時，頂端被置中推出捲動範圍而卡死（IG/LINE 內建瀏覽器常見） */
    min-height:100vh; min-height:100dvh; display:flex; align-items:flex-start; justify-content:center;
    padding:24px 16px calc(40px + env(safe-area-inset-bottom)); overflow-x:hidden;
  }
  .stage{ width:100%; max-width:440px; position:relative; }
  .stars{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .stars i{position:absolute; width:2px;height:2px;border-radius:50%;background:var(--gold-soft);opacity:.5;animation:tw 4s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.8;transform:scale(1.3)}}

  .screen{display:none; animation:fade .55s ease both; position:relative; z-index:1;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}

  .card{background:linear-gradient(180deg,rgba(30,23,48,.78),rgba(18,13,29,.9)); border:1px solid var(--line); border-radius:26px; padding:30px 24px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04); backdrop-filter:blur(8px);}
  .brandtag{ text-align:center; letter-spacing:.42em; font-size:11px; color:var(--gold); opacity:.85; margin-bottom:10px; padding-left:.42em;}
  h1{ text-align:center; font-size:30px; margin:6px 0 4px; font-weight:800; letter-spacing:.04em;
      background:linear-gradient(180deg,#fff7e3,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .sub{ text-align:center; color:var(--muted); font-size:13.5px; line-height:1.7; margin:6px 4px 0;}

  .btn{display:block; width:100%; border:0; cursor:pointer; padding:16px; border-radius:16px; font-size:16px; font-weight:700; letter-spacing:.05em;
    color:#1a1208; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); box-shadow:0 12px 30px rgba(216,182,106,.28); transition:.18s; margin-top:22px; font-family:inherit;}
  .btn:active{transform:translateY(2px); box-shadow:0 6px 16px rgba(216,182,106,.25);}
  .btn.ghost{ background:transparent; color:var(--gold-soft); border:1px solid var(--line); box-shadow:none; margin-top:12px;}

  .hero-orb{ width:128px; height:128px; margin:18px auto 8px; position:relative; }
  .hero-orb .core{position:absolute; inset:18px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #fff7e3, var(--gold) 42%, var(--gold-deep) 78%, #5a4520);
    box-shadow:0 0 40px rgba(216,182,106,.6), inset -8px -10px 24px rgba(0,0,0,.35); animation:bob 4s ease-in-out infinite;}
  .hero-orb .ring{position:absolute; inset:0; border:1px solid var(--line); border-radius:50%; animation:pulse 2.6s infinite ease-out;}
  @keyframes pulse{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.25);opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  /* 輸入 */
  label{display:block; font-size:12.5px; color:var(--gold-soft); margin:18px 2px 8px; letter-spacing:.06em;}
  label .opt{color:var(--muted); letter-spacing:0;}
  input{width:100%; padding:15px 14px; border-radius:13px; font-size:16px; font-family:inherit;
    background:rgba(12,10,20,.7); border:1px solid var(--line); color:var(--text); outline:none; transition:.15s;}
  input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(216,182,106,.12);}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{padding:10px 14px; border-radius:20px; font-size:13.5px; cursor:pointer;
    background:rgba(12,10,20,.6); border:1px solid var(--line); color:var(--muted); transition:.15s; user-select:none;}
  .chip.on{background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1208; font-weight:700; border-color:transparent;}
  .err{color:#e88a8a; font-size:12.5px; text-align:center; margin-top:10px; min-height:16px;}

  /* 臉部掃描 */
  .scan-title{text-align:center; font-size:19px; font-weight:700; margin-bottom:4px;}
  .scan-sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:8px; min-height:18px;}
  .face-wrap{width:240px; height:240px; margin:20px auto 8px; position:relative; border-radius:50%; overflow:hidden;
    background:#000; border:1px solid var(--line); box-shadow:0 0 30px rgba(216,182,106,.15);}
  #cam{width:100%; height:100%; object-fit:cover; transform:scaleX(-1);}
  .noCam{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:46px;
    background:radial-gradient(circle at 50% 45%, rgba(216,182,106,.12), transparent 70%);}
  .face-guide{position:absolute; inset:0; pointer-events:none;}
  .face-guide .oval{position:absolute; left:50%; top:48%; width:124px; height:156px; transform:translate(-50%,-50%);
    border:2px dashed rgba(216,182,106,.6); border-radius:50% 50% 48% 48%;}
  .face-guide .fline{position:absolute; left:8%; right:8%; height:2px; top:50%;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); box-shadow:0 0 14px 2px rgba(216,182,106,.8); opacity:0;}
  .face-wrap.scanning .face-guide .fline{opacity:1; animation:fsweep 1.6s linear infinite;}
  @keyframes fsweep{0%{top:18%}50%{top:82%}100%{top:18%}}
  .face-ring{position:absolute; inset:0; z-index:3; transform:rotate(-90deg); pointer-events:none;}
  .face-ring circle{fill:none; stroke-width:5; stroke-linecap:round;}
  .face-ring .bg{stroke:rgba(255,255,255,.08);}
  .face-ring .fg{stroke:url(#gp); stroke-dasharray:723; stroke-dashoffset:723; transition:stroke-dashoffset .12s linear; filter:drop-shadow(0 0 6px rgba(216,182,106,.8));}
  .press-hint{text-align:center; color:var(--gold-soft); font-size:13.5px; letter-spacing:.04em; margin-top:8px; min-height:20px;}
  .privacy{font-size:11px; color:var(--muted); text-align:center; margin-top:12px; line-height:1.7;}
  .privacy b{color:var(--gold-soft);}

  /* 結果共用 */
  .res-name{font-size:13px; color:var(--muted); letter-spacing:.1em; text-align:center;}
  .mood{ text-align:center; margin:10px 0 14px;}
  .mood .emo{font-size:58px; line-height:1; display:block; animation:bob 3s ease-in-out infinite;}
  .mood .label{font-size:26px; font-weight:800; margin-top:10px;
    background:linear-gradient(180deg,#fff7e3,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .mood .one{font-size:13.5px; color:var(--muted); margin-top:8px; line-height:1.7; padding:0 6px;}

  /* 籤詩 */
  .qian{margin:6px 0 4px; border-radius:20px; padding:24px 20px 22px; text-align:center; position:relative; overflow:hidden;
    background:radial-gradient(120% 80% at 50% 0%, rgba(216,182,106,.14), transparent 60%), linear-gradient(180deg, rgba(40,30,18,.7), rgba(24,16,10,.85));
    border:1px solid rgba(216,182,106,.32); box-shadow:0 16px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);}
  .qian::before,.qian::after{content:"❖"; position:absolute; color:var(--gold); opacity:.35; font-size:14px;}
  .qian::before{left:14px; top:12px;} .qian::after{right:14px; bottom:12px;}
  .qian .lv{display:inline-block; font-size:13px; letter-spacing:.3em; padding:5px 16px 5px 19px; border-radius:20px; border:1px solid rgba(216,182,106,.4); color:var(--gold-soft); margin-bottom:14px;}
  .qian .poem{font-size:19px; line-height:2.1; letter-spacing:.12em; color:#fff3d8; font-weight:600; text-shadow:0 2px 12px rgba(216,182,106,.25); margin:2px 0;}
  .qian .jie{margin-top:16px; padding-top:14px; border-top:1px dashed rgba(216,182,106,.28); font-size:13.5px; line-height:1.85; color:var(--muted);}
  .qian .jie b{color:var(--gold-soft); font-weight:700;}

  /* 為你而解（專屬連結，核心） */
  .foryou{margin-top:18px; border-radius:20px; padding:22px 20px; position:relative;
    background:linear-gradient(180deg, rgba(182,155,224,.12), rgba(120,95,180,.06)); border:1px solid rgba(182,155,224,.34);
    box-shadow:0 16px 40px rgba(60,40,100,.25);}
  .foryou .ti{font-size:12px; letter-spacing:.18em; color:var(--mystic); margin-bottom:4px;}
  .foryou .topic{font-size:17px; font-weight:800; color:#f0e9ff; margin-bottom:12px; line-height:1.5;}
  .foryou p{margin:0; font-size:14.5px; line-height:1.95; color:var(--text);}
  .foryou .em{color:#dcccff; font-weight:700;}
  .aitag{margin-top:12px; font-size:11.5px; letter-spacing:.08em; color:var(--mystic); opacity:.85;
    background:linear-gradient(90deg,rgba(182,155,224,.5),rgba(216,182,106,.6),rgba(182,155,224,.5)); background-size:200% 100%;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 1.6s linear infinite;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .score-wrap{ text-align:center; margin:20px 0 6px;}
  .score-num{font-size:46px; font-weight:800; color:var(--gold); line-height:1;}
  .score-num small{font-size:16px; color:var(--muted); font-weight:600;}
  .score-tag{display:inline-block; margin-top:6px; font-size:12px; padding:4px 16px; border-radius:20px; border:1px solid var(--line); color:var(--gold-soft); letter-spacing:.1em;}

  .bars{margin:18px 0 6px;}
  .bar{margin:11px 0;}
  .bar .t{display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;}
  .bar .t span:last-child{color:var(--gold-soft); font-weight:700;}
  .track{height:8px; border-radius:8px; background:rgba(255,255,255,.06); overflow:hidden;}
  .fill{height:100%; border-radius:8px; width:0; background:linear-gradient(90deg,var(--gold-deep),var(--gold-soft)); transition:width 1s cubic-bezier(.2,.8,.2,1);}

  .section{margin-top:22px;}
  .section h3{font-size:13px; color:var(--gold); letter-spacing:.12em; margin:0 0 10px; padding-left:2px;}

  /* 本命元素 */
  .element{display:flex; gap:14px; align-items:center; background:rgba(12,10,20,.6); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .element .sym{width:54px; height:54px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800;}
  .element .tx .nm{font-size:15px; font-weight:800; color:var(--gold-soft);}
  .element .tx p{margin:5px 0 0; font-size:13px; color:var(--muted); line-height:1.7;}

  /* 能量牌 */
  .tcard{margin:0 auto; width:100%; border-radius:18px; padding:20px; text-align:center; position:relative; overflow:hidden;
    background:linear-gradient(180deg, rgba(40,30,18,.8), rgba(20,14,9,.9)); border:1px solid rgba(216,182,106,.32);}
  .tcard .ico{font-size:42px; line-height:1;}
  .tcard .nm{font-size:18px; font-weight:800; margin-top:8px; color:#fff3d8;}
  .tcard .kw{display:inline-block; margin-top:8px; font-size:12px; letter-spacing:.16em; color:var(--gold); padding:3px 14px; border:1px solid rgba(216,182,106,.4); border-radius:20px;}
  .tcard p{margin:12px 0 0; font-size:13.5px; line-height:1.85; color:var(--muted);}

  .grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:10px 0 4px;}
  .cell{background:rgba(12,10,20,.6); border:1px solid var(--line); border-radius:14px; padding:13px 8px; text-align:center;}
  .cell .k{font-size:10.5px; color:var(--muted); letter-spacing:.06em;}
  .cell .v{font-size:16px; font-weight:700; margin-top:5px; color:var(--gold-soft);}
  .cell .v .dot{display:inline-block; width:12px;height:12px;border-radius:50%; vertical-align:-1px; margin-right:4px; border:1px solid rgba(255,255,255,.25);}

  .yi-box{background:rgba(122,214,160,.06); border:1px solid var(--line); border-radius:14px; padding:14px 16px;}
  .yi-box .tag{font-size:13px; font-weight:800; color:var(--good); margin-bottom:8px;}
  .yi-box .items{font-size:14px; line-height:1.9; color:var(--text); opacity:.95;}
  .remind{margin-top:12px; background:rgba(216,182,106,.07); border:1px solid var(--line); border-radius:14px; padding:14px 16px; font-size:13.5px; line-height:1.8; color:var(--gold-soft);}
  .remind b{color:var(--gold);}

  /* 神秘區 */
  .mys{background:linear-gradient(180deg, rgba(182,155,224,.1), transparent); border:1px solid rgba(182,155,224,.28); border-radius:16px; padding:16px;}
  .mys .kw{text-align:center; margin-bottom:14px;}
  .mys .kw .lab{font-size:11px; color:var(--mystic); letter-spacing:.16em;}
  .mys .kw .word{font-size:30px; font-weight:800; margin-top:4px; letter-spacing:.2em;
    background:linear-gradient(180deg,#f0e9ff,var(--mystic)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .mys .kw .mean{font-size:12.5px; color:var(--muted); margin-top:4px;}
  .mys .secret{font-size:13.5px; line-height:1.85; color:var(--text); padding-top:12px; border-top:1px dashed rgba(182,155,224,.3);}
  .mys .secret .h{color:var(--mystic); font-weight:800;}
  .mys .mission{margin-top:12px; font-size:13.5px; line-height:1.8; color:var(--gold-soft);}
  .mys .mission .h{color:var(--gold); font-weight:800;}

  .face-trait{background:linear-gradient(180deg,rgba(216,182,106,.08),transparent); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .face-trait .ptn{font-size:13px; color:var(--gold); letter-spacing:.08em;}
  .face-trait .ttl{font-size:16px; font-weight:800; margin:6px 0 8px;}
  .face-trait p{margin:0; font-size:13.5px; color:var(--muted); line-height:1.8;}

  .zhenyan{ text-align:center; font-size:16px; line-height:2; color:#fff3d8; padding:22px 18px; margin-top:22px; font-weight:600;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line); letter-spacing:.06em;}
  .zhenyan .q{color:var(--gold); font-size:22px;}
  .foot{text-align:center; font-size:10.5px; color:var(--muted); margin-top:18px; line-height:1.7; opacity:.7;}

  /* 生命靈數 / 本命第二張 */
  .lifepath{margin-top:10px;}
  .energy-line{margin:12px 2px 0; font-size:13.5px; line-height:1.8; color:var(--gold-soft); text-align:center;}

  /* 神秘揭曉鈕（點我看 QR） */
  .reveal{margin-top:26px; text-align:center; cursor:pointer; user-select:none; padding:20px 16px; border-radius:18px;
    border:1px solid rgba(182,155,224,.32);
    background:linear-gradient(180deg, rgba(182,155,224,.1), rgba(216,182,106,.05));
    position:relative; overflow:hidden; transition:.3s;}
  .reveal::after{content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,247,227,.18),transparent); transform:skewX(-20deg);
    animation:sweepLight 3s ease-in-out infinite;}
  @keyframes sweepLight{0%{left:-60%}55%,100%{left:130%}}
  .reveal:active{transform:scale(.98);}
  .reveal .reveal-text{font-size:15.5px; font-weight:800; letter-spacing:.04em;
    background:linear-gradient(180deg,#fff7e3,var(--mystic)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .reveal .reveal-sub{font-size:12.5px; color:var(--mystic); margin-top:8px; letter-spacing:.06em; animation:breathe 2.2s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
  .reveal.opened{opacity:.45;}
  .reveal.opened .reveal-sub{content:"";}

  .qrbox{max-height:0; opacity:0; overflow:hidden; transition:max-height .5s ease, opacity .5s ease; text-align:center;}
  .qrbox.show{max-height:560px; opacity:1; margin-top:14px;}
  .qr-cap{font-size:13px; letter-spacing:.2em; color:var(--gold); margin-bottom:14px;}
  .qr-frame{width:220px; height:220px; margin:0 auto; padding:14px; border-radius:20px; background:#fff;
    box-shadow:0 16px 40px rgba(216,182,106,.25); display:flex; align-items:center; justify-content:center;}
  .qr-frame img{width:100%; height:100%; display:block;}
  .qr-handle{margin-top:14px; font-size:17px; font-weight:800; color:var(--gold-soft); letter-spacing:.04em;}
  .qr-btn{display:inline-block; margin-top:14px; padding:13px 22px; border-radius:14px; font-size:14px; font-weight:700;
    color:#1a1208; text-decoration:none; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); box-shadow:0 10px 24px rgba(216,182,106,.28);}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<svg width="0" height="0"><defs>
  <linearGradient id="gp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8d3a0"/><stop offset="1" stop-color="#a9863f"/></linearGradient>
</defs></svg>

<div class="stage">

  <!-- 1. 封面 -->
  <section class="screen active" id="s1">
    <div class="card">
      <div class="brandtag">每 日 一 籤</div>
      <div class="hero-orb"><div class="ring"></div><div class="core"></div></div>
      <h1>今日運勢</h1>
      <p class="sub">說出今天要做的事，刷個臉<br>抽一支真正<b style="color:var(--gold-soft)">為你而解</b>的籤</p>
      <button class="btn" onclick="go(2)">開始占卜 ✦</button>
      <p class="foot">同一個人・同一天・同一件事，籤詩恆定不變<br>一覺醒來，明日自動換新</p>
    </div>
  </section>

  <!-- 2. 輸入 -->
  <section class="screen" id="s2">
    <div class="card">
      <div class="brandtag">讓 籤 看 懂 你</div>
      <h1 style="font-size:24px">準備抽籤</h1>
      <p class="sub">說得越具體，籤就解得越貼近你</p>

      <label>你的名字 / 暱稱</label>
      <input id="f-name" placeholder="怎麼稱呼你？" maxlength="20" autocomplete="off">

      <label>生日</label>
      <input id="f-birth" type="date" max="2025-12-31" min="1920-01-01">

      <label>今天你最在意 / 要做的事</label>
      <div class="chips" id="sceneChips">
        <div class="chip on" data-v="綜合">看整體</div>
        <div class="chip" data-v="面試">面試求職</div>
        <div class="chip" data-v="簡報">開會簡報</div>
        <div class="chip" data-v="業務">談合作・業務</div>
        <div class="chip" data-v="考試">考試進修</div>
        <div class="chip" data-v="感情">告白・約會</div>
        <div class="chip" data-v="見人">見重要的人</div>
        <div class="chip" data-v="決定">做個決定</div>
        <div class="chip" data-v="難題">處理難題</div>
        <div class="chip" data-v="休息">休息調整</div>
        <div class="chip" data-v="出遊">出遊放鬆</div>
        <div class="chip" data-v="新計畫">開始新計畫</div>
      </div>

      <label>或，用一句話說今天的事 <span class="opt">（可不填，填了更準）</span></label>
      <input id="f-thing" placeholder="例：下午要跟一個大客戶提案" maxlength="40" autocomplete="off">

      <div class="err" id="err2"></div>
      <button class="btn" onclick="toFace()">下一步・刷臉起卦 →</button>
      <button class="btn ghost" onclick="go(1)">返回</button>
    </div>
  </section>

  <!-- 3. 臉部掃描 -->
  <section class="screen" id="s3">
    <div class="card">
      <div class="brandtag">臉 部 感 應</div>
      <div class="scan-title">將臉對準框內</div>
      <div class="scan-sub" id="faceSub">啟動鏡頭中…</div>
      <div class="face-wrap" id="faceWrap">
        <video id="cam" autoplay playsinline muted></video>
        <div class="noCam" id="noCam" style="display:none">🔮</div>
        <div class="face-guide"><div class="oval"></div><div class="fline"></div></div>
        <svg class="face-ring" viewBox="0 0 240 240"><circle class="bg" cx="120" cy="120" r="115"/><circle class="fg" id="faceFg" cx="120" cy="120" r="115"/></svg>
      </div>
      <div class="press-hint" id="faceHint">　</div>
      <button class="btn" id="manualBtn" style="display:none" onclick="manualDivine()">✦ 點此手動起卦 ✦</button>

function cyrb53(str,seed=0){let h1=0xdeadbeef^seed,h2=0x41c6ce57^seed;for(let i=0;i<str.length;i++){const ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);return 4294967296*(2097151&h2)+(h1>>>0);}

let RNG=null;
function pick(a){return a[Math.floor(RNG()*a.length)];}
function rint(min,max){return Math.floor(RNG()*(max-min+1))+min;}

function lifePathNum(birth){ // birth: YYYY-MM-DD
  let s=birth.replace(/[^0-9]/g,'');
  function reduce(n){while(n>9&&n!==11&&n!==22){n=String(n).split('').reduce((a,b)=>a+(+b),0);}return n;}
  let sum=s.split('').reduce((a,b)=>a+(+b),0);
  return reduce(sum);
}

function matchScene(txt){
  const t=txt;const rules=[[/(面試|找工作|履歷|錄取|應徵)/,"面試"],[/(開會|報告|簡報|提案|上台|演講|發表)/,"簡報"],[/(客戶|成交|業務|合作|簽約|合約|談判|生意|案子)/,"業務"],[/(考試|考|讀書|證照|檢定|複習|期末)/,"考試"],[/(告白|約會|喜歡|曖昧|對象|相親|交往|心動)/,"感情"],[/(見|拜訪|長輩|父母|主管|老闆|前輩|聚)/,"見人"],[/(決定|選擇|要不要|抉擇|猶豫|該不該)/,"決定"],[/(難|問題|搞定|處理|麻煩|衝突|吵|和解|卡)/,"難題"],[/(休息|放鬆|累|耍廢|睡|耍|喘口氣)/,"休息"],[/(出遊|旅|玩|出去|散心|放空|度假)/,"出遊"],[/(開始|新|計畫|啟動|創業|第一天|展開)/,"新計畫"]];
  for(const[re,k]of rules)if(re.test(t))return k;return "綜合";
}

const cam=document.getElementById('cam'),faceWrap=document.getElementById('faceWrap'),faceFg=document.getElementById('faceFg');
const faceHint=document.getElementById('faceHint'),faceSub=document.getElementById('faceSub'),noCam=document.getElementById('noCam'),manualBtn=document.getElementById('manualBtn');
const FCIRC=723,FDUR=3400; let stream=null,fraf=null;
async function startFace(){
  go(3); faceHint.textContent="　"; faceFg.style.strokeDashoffset=FCIRC; faceWrap.classList.remove('scanning');
  faceSub.textContent="啟動鏡頭中…"; noCam.style.display="none"; manualBtn.style.display="none"; cam.style.display="block";
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    cam.srcObject=stream; faceSub.textContent="把臉對準虛線框，保持不動";
    setTimeout(beginFaceScan,800);
  }catch(err){
    cam.style.display="none"; noCam.style.display="flex";
    faceSub.textContent="鏡頭未開啟也沒關係";
    faceHint.textContent="（未授權或此瀏覽器不支援鏡頭）";
    manualBtn.style.display="block";
  }
}
function beginFaceScan(){
  if(!stream)return; faceWrap.classList.add('scanning'); const start=performance.now();
  const msgs=["偵測臉部輪廓…","讀取面相能量…","比對生辰星象…","為你起卦中…"];
  (function step(){
    if(!stream)return; const p=Math.min((performance.now()-start)/FDUR,1);
    faceFg.style.strokeDashoffset=FCIRC*(1-p); faceHint.textContent=msgs[Math.min(msgs.length-1,Math.floor(p*msgs.length))];
    if(p>=1){faceWrap.classList.remove('scanning');faceHint.textContent="✦ 起卦完成 ✦";if(navigator.vibrate)navigator.vibrate([30,40,30]);stopCam();setTimeout(()=>{computeAndShow();go(4);},650);return;}
    fraf=requestAnimationFrame(step);
  })();
}
function manualDivine(){faceHint.textContent="✦ 起卦完成 ✦";if(navigator.vibrate)navigator.vibrate([30,40,30]);setTimeout(()=>{computeAndShow();go(4);},400);}
function stopCam(){cancelAnimationFrame(fraf);if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}cam.srcObject=null;}

function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function esc(s){return(s+'').replace(/[<>&"]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[m]));}

function saveMem(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function enhanceForYou(payload,aiKey){
  const p=document.getElementById('foryouText'), tag=document.getElementById('aiTag');
  if(!p){return;}
  const drop=()=>{if(tag)tag.remove();};
  const ctrl=new AbortController(); const tm=setTimeout(()=>ctrl.abort(),11000);
  fetch('/.netlify/functions/fortune',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:ctrl.signal})
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(d=>{clearTimeout(tm);
      if(d&&d.text){saveMem(aiKey,d.text);p.style.opacity=0;p.innerHTML=esc(d.text).replace(/\n+/g,'<br>');requestAnimationFrame(()=>{p.style.transition='opacity .5s';p.style.opacity=1;});}
      drop();})
    .catch(()=>{clearTimeout(tm);drop();});
}
// IG QR 揭曉
let _qrLoaded=false;
function toggleQR(){
  const box=document.getElementById('qrbox'), rev=document.getElementById('igReveal');
  if(!_qrLoaded){
    const img=document.getElementById('qrimg');
    img.onerror=()=>{const f=document.querySelector('.qr-frame');if(f)f.style.display='none';};
    img.src=`https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data=${encodeURIComponent(IG_URL)}`;
    _qrLoaded=true;
  }
  const open=box.classList.toggle('show');
  rev.classList.toggle('opened',open);
  if(open) setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'center'}),120);
}
